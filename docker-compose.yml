services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: parkflow
      POSTGRES_PASSWORD: parkflow
      POSTGRES_DB: parkflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Migrations run automatically on first start (alphabetical order = correct)
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U parkflow']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    pull_policy: build
    environment:
      DATABASE_URL: postgresql://parkflow:parkflow@db:5432/parkflow
      PORT: 3001
      JWT_SECRET: local-dev-secret-change-in-prod
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    pull_policy: build
    environment:
      # Browser reaches backend via the host — keep localhost:3001
      VITE_API_URL: http://localhost:3001
      VITE_OAUTH_AUTHORITY: https://sso.matheo.si/application/o/park-flow
      VITE_OAUTH_CLIENT_ID: V9RNWkqNeQq8FhnTCxnPr3hhlQLoBXHkp0k8k95j
      VITE_OAUTH_REDIRECT_URI: http://localhost:5173/callback
      VITE_OAUTH_ADMIN_GROUP: parkflow-admins
    ports:
      - '5173:3000'
    depends_on:
      - backend

volumes:
  postgres-data:
