include:
  - component: ${CI_SERVER_FQDN}/pub/gitlab-ci-templates/gitlab-ci-local@~latest
  - component: ${CI_SERVER_FQDN}/pub/gitlab-ci-templates/secret-detection@~latest
    inputs:
      stage: security
  - component: ${CI_SERVER_FQDN}/pub/gitlab-ci-templates/trivy@~latest
    inputs:
      stage: security
      repository: true
  - project: 'pub/gitlab-ci-templates'
    ref: main
    file: '/templates/docker-multi-build.yml'
    inputs:
      stage: build
      buildList:
        - IMAGE_NAME: backend
          CONTEXT_PATH: backend
          DOCKER_FILE: backend/Dockerfile
        - IMAGE_NAME: frontend
          CONTEXT_PATH: frontend
          DOCKER_FILE: frontend/Dockerfile

stages:
  - security
  - test
  - lint
  - build

gitleaks_MR:
  before_script:
    - git branch --set-upstream-to=origin/$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME

trufflehog_MR:
  # Fix 1: fetch main at depth=1 so --since-commit=main resolves to the correct tip
  #         (shallow clones at depth=20 can mis-resolve main to its parent commit).
  # Fix 2: --only-verified so we don't fail on dev postgres credentials in docker-compose
  #         files — they use Docker-internal hostnames (db, db-test) that are unreachable
  #         from CI runners and therefore always unverified.
  before_script:
    - git fetch origin main --depth=1
    - git branch -f main FETCH_HEAD
  script:
    - echo "TRUFFLEHOG OPTIONS: $TH_OPTS"
    - trufflehog git file://. --fail --only-verified --branch=$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME ${TH_OPTS}

variables:
  # Dependency-Track integration used by trivy template job `repo_sbom_upload`.
  # Set these in GitLab CI/CD variables (project/group):
  # - DEPENDENCY_TRACK_API_URL (example: https://dependency-track.example.com/api/v1/bom)
  # - DEPENDENCY_TRACK_API_KEY
  # - DEPENDENCY_TRACK_PROJECT_ID (UUID)
  MATHEO_DT_API: $DEPENDENCY_TRACK_API_URL
  MATHEO_DT_API_KEY: $DEPENDENCY_TRACK_API_KEY
  DT_PROJECT_ID: $DEPENDENCY_TRACK_PROJECT_ID

default:
  image: oven/bun:1.2.22

backend_test:
  stage: test
  variables:
    NODE_ENV: test
    DATABASE_URL: postgresql://localhost:5432/postgres
    JWT_SECRET: test-secret
  script:
    - cd backend
    - bun install --frozen-lockfile
    - bun run test
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH

backend_lint:
  stage: lint
  script:
    - cd backend
    - bun install --frozen-lockfile
    - bunx tsc -p tsconfig.json --noEmit
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH

frontend_lint:
  stage: lint
  script:
    - cd frontend
    - bun install --frozen-lockfile
    - bun run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH

compose_dockerfile_guard:
  stage: lint
  script:
    - |
      grep -q 'dockerfile: Dockerfile.dev' docker-compose.dev.yml
      test "$(grep -c 'dockerfile: Dockerfile.dev' docker-compose.dev.yml)" -eq 2
      grep -q 'dockerfile: Dockerfile' docker-compose.yml
      test "$(grep -c 'dockerfile: Dockerfile' docker-compose.yml)" -eq 2
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH

frontend_build:
  stage: build
  script:
    - cd frontend
    - bun install --frozen-lockfile
    - bun run build
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH
