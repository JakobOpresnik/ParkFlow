<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkFlow — Map Coordinate Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e5e5e5; }
    header { padding: 12px 20px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    header h1 { font-size: 15px; font-weight: 600; }
    .badge { font-size: 12px; background: #333; padding: 2px 8px; border-radius: 9999px; }
    .btn { padding: 6px 14px; font-size: 13px; border-radius: 6px; border: 1px solid #444; background: #222; color: #e5e5e5; cursor: pointer; }
    .btn:hover { background: #333; }
    .btn-primary { background: #4f46e5; border-color: #4f46e5; color: white; }
    .btn-primary:hover { background: #4338ca; }
    .btn-danger { background: #dc2626; border-color: #dc2626; color: white; }
    .btn-danger:hover { background: #b91c1c; }
    main { display: flex; height: calc(100vh - 49px); }
    #canvas-wrapper { position: relative; flex: 1; overflow: auto; background: #111; }
    #canvas-wrapper img { display: block; max-width: 100%; user-select: none; }
    svg#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    svg#overlay .clickable { pointer-events: all; }
    #sidebar { width: 300px; min-width: 260px; background: #1a1a1a; border-left: 1px solid #333; display: flex; flex-direction: column; overflow: hidden; }
    #sidebar-header { padding: 12px; border-bottom: 1px solid #333; display: flex; flex-direction: column; gap: 8px; }
    #spot-num-row { display: flex; align-items: center; gap: 8px; }
    #spot-num-row label { font-size: 13px; }
    #spot-num { width: 70px; padding: 4px 8px; background: #111; border: 1px solid #444; border-radius: 6px; color: #e5e5e5; font-size: 14px; }
    #spots-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
    .spot-item { background: #222; border: 1px solid #333; border-radius: 6px; padding: 8px 10px; display: flex; align-items: center; gap: 8px; }
    .spot-item .num { font-weight: 700; font-size: 14px; min-width: 28px; }
    .spot-item .pts { font-size: 11px; color: #888; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .spot-item .del { background: none; border: none; color: #666; cursor: pointer; font-size: 16px; line-height: 1; }
    .spot-item .del:hover { color: #ef4444; }
    #output-area { border-top: 1px solid #333; padding: 12px; }
    #output-area textarea { width: 100%; height: 120px; background: #111; border: 1px solid #444; border-radius: 6px; color: #e5e5e5; font-size: 11px; font-family: monospace; padding: 8px; resize: vertical; }
    #status { font-size: 12px; color: #888; padding: 4px 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #4f46e5; display: inline-block; margin-right: 4px; }
  </style>
</head>
<body>

<header>
  <h1>ParkFlow Map Tool</h1>
  <span class="badge" id="mode-badge">Click to place corners</span>
  <label style="font-size:13px; margin-left: auto">
    Image:
    <input type="file" id="img-upload" accept="image/*" style="font-size:13px; margin-left:6px" />
  </label>
  <button class="btn btn-primary" id="btn-finish">Finish polygon</button>
  <button class="btn btn-danger" id="btn-clear-current">Clear current</button>
  <button class="btn" id="btn-export">Export JSON</button>
  <button class="btn" id="btn-import">Import JSON</button>
  <input type="file" id="json-import-input" accept=".json" style="display:none" />
</header>

<main>
  <div id="canvas-wrapper">
    <img id="map-img" src="" alt="Upload a floor plan to begin" draggable="false" />
    <svg id="overlay" xmlns="http://www.w3.org/2000/svg">
      <g id="finished-spots"></g>
      <g id="current-polygon"></g>
    </svg>
  </div>

  <aside id="sidebar">
    <div id="sidebar-header">
      <div id="spot-num-row">
        <label for="spot-num">Spot #:</label>
        <input type="number" id="spot-num" min="1" value="1" />
        <span id="status"><span class="dot"></span>Ready</span>
      </div>
      <div style="font-size:12px; color:#888">
        Click on map to place corners → Finish polygon → next spot
      </div>
    </div>
    <div id="spots-list"></div>
    <div id="output-area">
      <textarea id="json-output" readonly placeholder="JSON output will appear here after export…"></textarea>
      <div style="display:flex; gap:6px; margin-top:6px">
        <button class="btn" style="flex:1" id="btn-copy">Copy JSON</button>
        <button class="btn" style="flex:1" id="btn-save">Save as file</button>
      </div>
    </div>
  </aside>
</main>

<script>
  const img = document.getElementById('map-img')
  const overlay = document.getElementById('overlay')
  const finishedG = document.getElementById('finished-spots')
  const currentG = document.getElementById('current-polygon')
  const spotNumInput = document.getElementById('spot-num')
  const statusEl = document.getElementById('status')
  const spotsList = document.getElementById('spots-list')
  const jsonOutput = document.getElementById('json-output')

  let spots = []           // { number, points: [[x,y], ...] }
  let currentPoints = []   // [[x,y], ...]
  let imgNaturalW = 1200
  let imgNaturalH = 700

  // Load image
  document.getElementById('img-upload').addEventListener('change', (e) => {
    const file = e.target.files[0]
    if (!file) return
    const url = URL.createObjectURL(file)
    img.src = url
    img.onload = () => {
      imgNaturalW = img.naturalWidth
      imgNaturalH = img.naturalHeight
      overlay.setAttribute('viewBox', `0 0 ${imgNaturalW} ${imgNaturalH}`)
      setStatus('Image loaded — start clicking corners')
    }
  })

  function setStatus(msg) {
    statusEl.innerHTML = `<span class="dot"></span>${msg}`
  }

  function svgPoint(e) {
    const rect = img.getBoundingClientRect()
    const scaleX = imgNaturalW / rect.width
    const scaleY = imgNaturalH / rect.height
    return [
      Math.round((e.clientX - rect.left) * scaleX),
      Math.round((e.clientY - rect.top) * scaleY),
    ]
  }

  overlay.addEventListener('click', (e) => {
    if (!img.src || img.src === window.location.href) {
      setStatus('Upload an image first!')
      return
    }
    const pt = svgPoint(e)
    currentPoints.push(pt)
    renderCurrent()
    setStatus(`${currentPoints.length} corner(s) placed. Finish or keep clicking.`)
  })

  function renderCurrent() {
    currentG.innerHTML = ''
    if (currentPoints.length === 0) return

    // Dots
    currentPoints.forEach(([x, y], i) => {
      const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle')
      c.setAttribute('cx', x)
      c.setAttribute('cy', y)
      c.setAttribute('r', 5)
      c.setAttribute('fill', '#4f46e5')
      c.setAttribute('stroke', 'white')
      c.setAttribute('stroke-width', 1.5)
      c.classList.add('clickable')
      currentG.appendChild(c)
    })

    // Lines
    if (currentPoints.length > 1) {
      const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polyline')
      poly.setAttribute('points', currentPoints.map(p => p.join(',')).join(' '))
      poly.setAttribute('fill', 'none')
      poly.setAttribute('stroke', '#4f46e5')
      poly.setAttribute('stroke-width', 2)
      poly.setAttribute('stroke-dasharray', '6 3')
      currentG.insertBefore(poly, currentG.firstChild)
    }
  }

  document.getElementById('btn-finish').addEventListener('click', () => {
    if (currentPoints.length < 3) {
      setStatus('Need at least 3 corners to finish a polygon')
      return
    }
    const number = parseInt(spotNumInput.value, 10)
    if (isNaN(number)) {
      setStatus('Enter a valid spot number')
      return
    }

    // Remove existing with same number
    spots = spots.filter(s => s.number !== number)
    spots.push({ number, points: [...currentPoints] })
    spots.sort((a, b) => a.number - b.number)

    currentPoints = []
    renderCurrent()
    renderFinished()
    renderSidebar()

    // Auto-advance spot number
    spotNumInput.value = number + 1
    setStatus(`Spot #${number} saved! Now place spot #${number + 1}.`)
  })

  document.getElementById('btn-clear-current').addEventListener('click', () => {
    currentPoints = []
    renderCurrent()
    setStatus('Current polygon cleared')
  })

  function renderFinished() {
    finishedG.innerHTML = ''
    spots.forEach(({ number, points }) => {
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g')

      const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon')
      poly.setAttribute('points', points.map(p => p.join(',')).join(' '))
      poly.setAttribute('fill', 'rgba(79,70,229,0.25)')
      poly.setAttribute('stroke', '#4f46e5')
      poly.setAttribute('stroke-width', 1.5)
      g.appendChild(poly)

      const cx = points.reduce((s, [x]) => s + x, 0) / points.length
      const cy = points.reduce((s, [, y]) => s + y, 0) / points.length
      const t = document.createElementNS('http://www.w3.org/2000/svg', 'text')
      t.setAttribute('x', cx)
      t.setAttribute('y', cy)
      t.setAttribute('text-anchor', 'middle')
      t.setAttribute('dominant-baseline', 'middle')
      t.setAttribute('font-size', 20)
      t.setAttribute('font-weight', 700)
      t.setAttribute('fill', 'white')
      t.setAttribute('stroke', 'rgba(0,0,0,0.6)')
      t.setAttribute('stroke-width', 3)
      t.setAttribute('paint-order', 'stroke')
      t.textContent = number
      g.appendChild(t)

      finishedG.appendChild(g)
    })
  }

  function renderSidebar() {
    spotsList.innerHTML = ''
    spots.forEach(({ number, points }) => {
      const div = document.createElement('div')
      div.className = 'spot-item'
      div.innerHTML = `
        <span class="num">#${number}</span>
        <span class="pts">${points.map(p => p.join(',')).join(' ')}</span>
        <button class="del" data-num="${number}" title="Remove">×</button>
      `
      spotsList.appendChild(div)
    })
    spotsList.querySelectorAll('.del').forEach(btn => {
      btn.addEventListener('click', () => {
        const n = parseInt(btn.dataset.num, 10)
        spots = spots.filter(s => s.number !== n)
        renderFinished()
        renderSidebar()
      })
    })
  }

  function buildJson() {
    return JSON.stringify({
      imageWidth: imgNaturalW,
      imageHeight: imgNaturalH,
      spots: spots.map(({ number, points }) => ({
        number,
        points: points.map(p => p.join(',')).join(' '),
      })),
    }, null, 2)
  }

  document.getElementById('btn-export').addEventListener('click', () => {
    jsonOutput.value = buildJson()
    setStatus('JSON exported below')
  })

  document.getElementById('btn-copy').addEventListener('click', () => {
    const json = buildJson()
    navigator.clipboard.writeText(json).then(() => setStatus('Copied to clipboard!'))
  })

  document.getElementById('btn-save').addEventListener('click', () => {
    const json = buildJson()
    const blob = new Blob([json], { type: 'application/json' })
    const a = document.createElement('a')
    a.href = URL.createObjectURL(blob)
    a.download = 'spot-coordinates.json'
    a.click()
    setStatus('File downloaded')
  })

  // Import existing JSON
  document.getElementById('btn-import').addEventListener('click', () => {
    document.getElementById('json-import-input').click()
  })

  document.getElementById('json-import-input').addEventListener('change', (e) => {
    const file = e.target.files[0]
    if (!file) return
    const reader = new FileReader()
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result)
        imgNaturalW = data.imageWidth ?? imgNaturalW
        imgNaturalH = data.imageHeight ?? imgNaturalH
        overlay.setAttribute('viewBox', `0 0 ${imgNaturalW} ${imgNaturalH}`)
        spots = (data.spots ?? []).map(({ number, points }) => ({
          number,
          points: points.split(' ').map(p => p.split(',').map(Number)),
        }))
        spots.sort((a, b) => a.number - b.number)
        renderFinished()
        renderSidebar()
        setStatus(`Imported ${spots.length} spots`)
      } catch {
        setStatus('Failed to parse JSON')
      }
    }
    reader.readAsText(file)
  })
</script>
</body>
</html>
